<style>
:root{--bg:#0a0a0a;--card:#141414;--border:#222;--text:#e8e8e8;--dim:#666;--accent:#00d4aa;--warm:#ff6b4a;--cool:#4a9eff;--purple:#b07aff;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:14px;-webkit-font-smoothing:antialiased}

.top-bar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:16px}
.top-bar .logo{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.top-bar .logo span{color:var(--accent)}
.top-bar nav{display:flex;gap:4px;margin-left:auto}

.top-bar nav a:hover,.top-bar nav a.on{color:var(--text);background:rgba(255,255,255,.06)}

.layout{max-width:1100px;margin:0 auto;padding:24px 20px}
.intro{text-align:center;padding:40px 20px 32px}

.ctrls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:20px 0}

.ctrls button.go{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:600}
.ctrls button.go:hover{opacity:.85}

.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.stat-chip{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:12px}
.stat-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.stat-chip .dot.off{background:var(--dim)}
.stat-chip .lbl{color:var(--dim)}
.stat-chip .val{color:var(--text);font-weight:600;font-family:"SF Mono",Menlo,monospace}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#333}
.card-head{padding:14px 18px 10px;display:flex;align-items:center;gap:8px}
.card-head .icon{font-size:14px;opacity:.6}
.card-head h3{font-size:13px;font-weight:600;color:var(--dim);letter-spacing:0.3px}
.card-body{padding:0 18px 18px}
.span-full{grid-column:1/-1}

canvas{display:block;width:100%}

/* Force dots - the key minimalist element */
.force-dots{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;margin:0 auto}
.force-dot{aspect-ratio:1;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;position:relative}
.force-dot .num{font-size:10px;color:var(--dim);font-weight:500;position:absolute;top:6px}
.force-dot .v{font-size:18px;font-weight:700;font-family:"SF Mono",Menlo,monospace}
.force-dot .n{font-size:9px;color:rgba(255,255,255,.5);position:absolute;bottom:6px}

/* 3D surface container */
.surface-3d{position:relative}
.surface-3d .hint{position:absolute;bottom:10px;right:14px;font-size:10px;color:var(--dim);opacity:.5}

/* Data table */
.mini-table{width:100%;border-collapse:collapse;font-size:12px;font-family:"SF Mono",Menlo,monospace}
.mini-table th{text-align:left;padding:8px 10px;color:var(--dim);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.mini-table td{padding:6px 10px;color:var(--dim);border-bottom:1px solid rgba(34,34,34,.5)}
.mini-table td:nth-child(2),.mini-table td:nth-child(3),.mini-table td:nth-child(4){text-align:right;font-variant-numeric:tabular-nums}
.mini-table tr:hover td{color:var(--text)}
.mini-table .highlight td{color:var(--accent);font-weight:600}

.raw{margin-top:8px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:"SF Mono",monospace;font-size:11px;color:var(--dim);overflow-x:auto;white-space:nowrap}

.footer{text-align:center;padding:32px;color:var(--dim);font-size:12px;border-top:1px solid var(--border);margin-top:32px}
.footer a{color:var(--accent);text-decoration:none}
</style>

<script>
// ── Constants ──
const MA_W=15, EMA_A=0.25;
const N_ZERO=680, N_DELTA=60, N_MAX=6, S_MAX=10;
const HIST=400;
const NF={0:1,1:3,2:5,3:7,4:9};
const PX={1:[0,2],2:[1,2],3:[2,2],4:[0,1],5:[1,1],6:[2,1],7:[0,0],8:[1,0],9:[2,0]};
const CH=["NF1","NF2","NF3","NF4","NF5","SF1·x+","SF2·x-","SF3·y+","SF4·y-","Temp","Std"];
const SDIR=["x+","x-","y+","y-"];
const SXY=[[0,2],[2,2],[1,1],[0,0],[2,0]];

// ── State ──
let on=false, t0=0, fc=0, lr=0, rate=0;
let nz=false, sz=false, nb=new Float64Array(5), sb=new Float64Array(4);
let ma=[], ema=null;
let hT=[],hFN=[],hFx=[],hFy=[];
function rstF(){ma=[];ema=null;}

// Camera
let rx=-0.52, rz=-0.82, cd=3.6;
let dg=false,dx=0,dy=0;

// ── RNG ──
let rnc=[1,1],rns=3,rnsg=0.6,rno=[0,0,0,0,0],rnn=0;
function rn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function ra(a,b){return a+Math.random()*(b-a);}

function gen(t){
    if(t>=rnn){
        rnc=[ra(-.15,2.15),ra(-.15,2.15)];rns=ra(1.4,5.8)*parseFloat(document.getElementById('sensitivity').value);
        rnsg=ra(.38,.9);rno=Array.from({length:5},()=>rn()*.9);rnn=t+ra(.28,.95);
    }
    let cx=rnc[0]+rn()*.035,cy=rnc[1]+rn()*.035,n=new Float64Array(5);
    for(let i=0;i<5;i++){
        let dx=SXY[i][0]-cx,dy=SXY[i][1]-cy,sh=Math.exp(-(dx*dx+dy*dy)/(2*rnsg*rnsg));
        if(Math.random()<.38){let x2=ra(-.2,2.2),y2=ra(-.2,2.2),s2=ra(.28,.65),st=ra(.3,1.8);sh+=st*Math.exp(-((SXY[i][0]-x2)**2+(SXY[i][1]-y2)**2)/(2*s2*s2));}
        let fn=Math.max(0,Math.min(6,rns*sh*(1+rn()*.16)+rno[i]*.12));
        n[i]=680+(fn/N_MAX)*N_DELTA+rn()*2.2*1.25;
        n[i]=Math.round(Math.max(660,Math.min(735,n[i])));
    }
    let px=.5+.5*Math.sin(2*Math.PI*.11*t),py=.5+.5*Math.cos(2*Math.PI*.09*t+.5);
    let s=[Math.max(0,Math.min(9,2+Math.round(5*px)+Math.floor(ra(-1,2)))),Math.max(0,Math.min(9,2+Math.round(4*(1-px))+Math.floor(ra(-1,2)))),Math.max(0,Math.min(9,2+Math.round(5*py)+Math.floor(ra(-1,2)))),Math.max(0,Math.min(9,2+Math.round(4*(1-py))+Math.floor(ra(-1,2))))];
    let tp=Math.max(0,Math.min(9,5+Math.round(3*Math.sin(2*Math.PI*.025*t+1.2))+Math.floor(ra(-1,2))));
    return[...n,...s,tp,202+Math.round(2*Math.sin(2*Math.PI*.07*t))+Math.floor(ra(-1,2))];
}

// ── Filter ──
function filt(r){
    ma.push(r);if(ma.length>MA_W)ma.shift();
    let m=new Float64Array(11);
    for(let s of ma)for(let i=0;i<11;i++)m[i]+=s[i];
    for(let i=0;i<11;i++)m[i]/=ma.length;
    if(!ema)ema=new Float64Array(m);else for(let i=0;i<11;i++)ema[i]=EMA_A*m[i]+(1-EMA_A)*ema[i];
    return new Float64Array(ema);
}

function cal(f){
    let ni=f.slice(0,5),si=f.slice(5,9);
    if(nz)for(let i=0;i<5;i++)ni[i]-=nb[i];else for(let i=0;i<5;i++)ni[i]-=N_ZERO;
    if(sz)for(let i=0;i<4;i++)si[i]-=sb[i];
    let fn=new Float64Array(9);
    for(let i=0;i<5;i++){let p=NF[i];fn[p-1]=Math.max(0,Math.min(N_MAX,Math.abs(ni[i])/N_DELTA*N_MAX));}
    fn[1]=(fn[0]+fn[2]+fn[4])/3;fn[3]=(fn[0]+fn[4]+fn[6])/3;fn[5]=(fn[2]+fn[4]+fn[8])/3;fn[7]=(fn[4]+fn[6]+fn[8])/3;
    let s4=new Float64Array(4);for(let i=0;i<4;i++)s4[i]=Math.max(0,Math.min(S_MAX,si[i]));
    let fx=s4[0]-s4[1],fy=s4[2]-s4[3],fm=Math.hypot(fx,fy);
    let fr=Math.max(...fn),g=fm>1e-9?fr/fm:null;
    return{fn,s4,fx,fy,fm,fr,g,ta:f[9]};
}

// ── Color ──
function vc(v,mx){
    let t=Math.max(0,Math.min(1,v/mx)),r,g,b;
    if(t<.3){let u=t/.3;r=0;g=Math.round(180*u);b=Math.round(100+155*u);}
    else if(t<.6){let u=(t-.3)/.3;r=Math.round(255*u);g=Math.round(180+75*u);b=Math.round(255*(1-u));}
    else{let u=(t-.6)/.4;r=255;g=Math.round(255*(1-u*.7));b=0;}
    return[r,g,b];
}

// ── IDW grid ──
function idw(fn,n){
    let g=[];
    for(let y=0;y<=n;y++){g[y]=[];for(let x=0;x<=n;x++){
        let px=x/n*2,py=(1-y/n)*2,ws=0,v=0;
        for(let i=0;i<9;i++){let sx=PX[i+1][0],sy=PX[i+1][1],d=(px-sx)**2+(py-sy)**2,w=1/(Math.pow(d+.035,1.65)+1e-9);v+=w*fn[i];ws+=w;}
        g[y][x]=v/ws;
    }}
    return g;
}

// ── 3D Projection ──
function P(x,y,z){
    let x1=x*Math.cos(rz)-y*Math.sin(rz),y1=x*Math.sin(rz)+y*Math.cos(rz);
    let y2=y1*Math.cos(rx)-z*Math.sin(rx),z2=y1*Math.sin(rx)+z*Math.cos(rx);
    let s=cd/(cd+z2*.4);
    return[220+x1*s*80,170-y2*s*80,z2];
}

// ── 3D Draw ──
function draw3D(fn,mx){
    const c=document.getElementById('c3d'),x=c.getContext('2d'),W=c.width,H=c.height;
    x.clearRect(0,0,W,H);x.fillStyle='#0e0e0e';x.fillRect(0,0,W,H);
    let n=24,g=idw(fn,n),ds=.5;
    let qs=[];
    for(let gy=0;gy<n;gy++)for(let gx=0;gx<n;gx++){
        let u0=gx/n*2-1,v0=(1-gy/n)*2-1,u1=(gx+1)/n*2-1,v1=(1-(gy+1)/n)*2-1;
        let f00=g[gy][gx],f10=g[gy][gx+1],f01=g[gy+1][gx],f11=g[gy+1][gx+1];
        let z00=-f00*ds/mx,z10=-f10*ds/mx,z01=-f01*ds/mx,z11=-f11*ds/mx;
        let p00=P(u0,v0,z00),p10=P(u1,v0,z10),p01=P(u0,v1,z01),p11=P(u1,v1,z11);
        let az=(p00[2]+p10[2]+p01[2]+p11[2])/4,af=(f00+f10+f01+f11)/4;
        let nx=(z10-z00)*(z11-z01)-(z01-z00)*(z11-z10),ny=(z01-z00)*(z11-z10)-(z10-z00)*(z01-z00),nz2=1;
        let nl=Math.sqrt(nx*nx+ny*ny+1)||1;
        let lt=Math.max(.3,.5+.5*(nx*.3+ny*.4+nz2*.85)/nl);
        let edge=gx===0||gx===n-1||gy===0||gy===n-1;
        qs.push({p00,p10,p01,p11,az,af,lt,edge});
    }
    qs.sort((a,b)=>b.az-a.az);
    for(let q of qs){
        let c2=vc(q.af,mx);
        let r=Math.round(c2[0]*q.lt),g2=Math.round(c2[1]*q.lt),b=Math.round(c2[2]*q.lt);
        x.fillStyle=`rgb(${r},${g2},${b})`;
        x.strokeStyle=`rgba(${r>>1},${g2>>1},${b>>1},.35)`;x.lineWidth=.3;
        x.beginPath();x.moveTo(q.p00[0],q.p00[1]);x.lineTo(q.p10[0],q.p10[1]);x.lineTo(q.p11[0],q.p11[1]);x.lineTo(q.p01[0],q.p01[1]);x.closePath();x.fill();x.stroke();
        if(q.edge){x.strokeStyle='rgba(0,212,170,.35)';x.lineWidth=1;x.beginPath();x.moveTo(q.p00[0],q.p00[1]);x.lineTo(q.p10[0],q.p10[1]);x.lineTo(q.p11[0],q.p11[1]);x.lineTo(q.p01[0],q.p01[1]);x.closePath();x.stroke();}
    }
    // Sensors
    x.font='bold 11px SF Mono,Menlo,monospace';x.textAlign='center';
    for(let i=0;i<9;i++){
        let ux=PX[i+1][0]-1,vy=1-PX[i+1][1],z=-fn[i]*ds/mx,p=P(ux,vy,z);
        x.fillStyle='rgba(255,255,255,.8)';x.beginPath();x.arc(p[0],p[1],2.5,0,Math.PI*2);x.fill();
        x.shadowColor='rgba(0,0,0,.6)';x.shadowBlur=3;x.fillStyle='rgba(255,255,255,.9)';
        x.fillText(fn[i].toFixed(1),p[0],p[1]-7);x.shadowBlur=0;
    }
    // Finger shadow
    let tf=0,sx=0,sy=0;for(let i=0;i<9;i++){tf+=fn[i];sx+=PX[i+1][0]*fn[i];sy+=PX[i+1][1]*fn[i];}
    if(tf>.1){
        let fcx=sx/tf-1,fcy=1-sy/tf,fr=.45;
        x.fillStyle='rgba(0,0,0,.12)';x.beginPath();
        for(let s=0;s<=32;s++){let a=s/32*Math.PI*2,fx2=fcx+fr*Math.cos(a)*.8,fy2=fcy+fr*Math.sin(a)*1.2,sp=P(fx2,fy2,-.01);if(s===0)x.moveTo(sp[0],sp[1]);else x.lineTo(sp[0],sp[1]);}
        x.closePath();x.fill();
        // Finger body
        let top=[],bot=[];
        for(let s=0;s<=32;s++){let a=s/32*Math.PI*2,fx2=fcx+fr*Math.cos(a)*.8,fy2=fcy+fr*Math.sin(a)*1.2;top.push(P(fx2,fy2,.5));bot.push(P(fx2,fy2,.15));}
        x.fillStyle='rgba(240,220,200,.18)';x.strokeStyle='rgba(240,220,200,.3)';x.lineWidth=.6;
        for(let s=0;s<32;s++){x.beginPath();x.moveTo(top[s][0],top[s][1]);x.lineTo(top[s+1][0],top[s+1][1]);x.lineTo(bot[s+1][0],bot[s+1][1]);x.lineTo(bot[s][0],bot[s][1]);x.closePath();x.fill();x.stroke();}
        x.fillStyle='rgba(240,220,200,.25)';x.beginPath();for(let s=0;s<=32;s++){if(s===0)x.moveTo(top[s][0],top[s][1]);else x.lineTo(top[s][0],top[s][1]);}x.closePath();x.fill();
        x.strokeStyle='rgba(240,200,170,.5)';x.lineWidth=1.2;x.beginPath();for(let s=0;s<=32;s++){if(s===0)x.moveTo(bot[s][0],bot[s][1]);else x.lineTo(bot[s][0],bot[s][1]);}x.closePath();x.stroke();
    }
    // Scale
    let bx=380,by=50,bh=160;
    let grd=x.createLinearGradient(bx,by,bx,by+bh);
    for(let i=0;i<=10;i++){let t=i/10,c2=vc(t*mx,mx);grd.addColorStop(t,`rgb(${c2[0]},${c2[1]},${c2[2]})`);}
    x.fillStyle=grd;x.fillRect(bx,by,10,bh);
    x.fillStyle='#666';x.font='10px SF Mono,monospace';x.textAlign='left';
    x.fillText(mx.toFixed(0)+' N',bx+14,by+8);x.fillText('0',bx+14,by+bh);
}

// 3D interaction
const c3dEl=document.getElementById('c3d');
c3dEl.addEventListener('mousedown',e=>{dg=true;dx=e.clientX;dy=e.clientY;});
c3dEl.addEventListener('mousemove',e=>{if(!dg)return;rz+=(e.clientX-dx)*.008;rx+=(e.clientY-dy)*.008;rx=Math.max(-1.3,Math.min(.05,rx));dx=e.clientX;dy=e.clientY;});
c3dEl.addEventListener('mouseup',()=>dg=false);c3dEl.addEventListener('mouseleave',()=>dg=false);
c3dEl.addEventListener('wheel',e=>{e.preventDefault();cd=Math.max(2.5,Math.min(8,cd+e.deltaY*.005));},{passive:false});
c3dEl.addEventListener('touchstart',e=>{e.preventDefault();dg=true;dx=e.touches[0].clientX;dy=e.touches[0].clientY;},{passive:false});
c3dEl.addEventListener('touchmove',e=>{if(!dg)return;e.preventDefault();rz+=(e.touches[0].clientX-dx)*.008;rx+=(e.touches[0].clientY-dy)*.008;rx=Math.max(-1.3,Math.min(.05,rx));dx=e.touches[0].clientX;dy=e.touches[0].clientY;},{passive:false});
c3dEl.addEventListener('touchend',()=>dg=false);

// ── Shear ──
function drawShear(s4,fx,fy,fm){
    const c=document.getElementById('cShear'),x=c.getContext('2d'),W=c.width,H=c.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-36;
    x.clearRect(0,0,W,H);x.fillStyle='#0e0e0e';x.beginPath();x.arc(cx,cy,R,0,Math.PI*2);x.fill();
    x.strokeStyle='rgba(255,255,255,.04)';x.lineWidth=1;
    for(let r=R/4;r<=R;r+=R/4){x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.stroke();}
    x.beginPath();x.moveTo(cx-R,cy);x.lineTo(cx+R,cy);x.stroke();
    x.beginPath();x.moveTo(cx,cy-R);x.lineTo(cx,cy+R);x.stroke();
    x.fillStyle='#666';x.font='600 11px -apple-system,sans-serif';x.textAlign='center';
    x.fillText('y+ '+s4[2].toFixed(1),cx,cy-R+15);
    x.fillText('x+ '+s4[0].toFixed(1),cx+R-8,cy+4);
    x.fillText('y- '+s4[3].toFixed(1),cx,cy+R-6);
    x.fillText('x- '+s4[1].toFixed(1),cx-R+12,cy+4);
    let mr=parseFloat(document.getElementById('shearRange').value);
    let vx=(fx/mr)*R*.78,vy=-(fy/mr)*R*.78;
    if(Math.hypot(vx,vy)>1){
        x.strokeStyle='var(--accent)';x.fillStyle='var(--accent)';x.lineWidth=2.5;
        x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+vx,cy+vy);x.stroke();
        let a=Math.atan2(vy,vx);x.beginPath();x.moveTo(cx+vx,cy+vy);
        x.lineTo(cx+vx-10*Math.cos(a-.3),cy+vy-10*Math.sin(a-.3));
        x.lineTo(cx+vx-10*Math.cos(a+.3),cy+vy-10*Math.sin(a+.3));
        x.closePath();x.fill();
    }
    x.fillStyle='#fff';x.beginPath();x.arc(cx,cy,2.5,0,Math.PI*2);x.fill();
    x.fillStyle='#666';x.font='600 12px SF Mono,monospace';
    x.fillText(fm.toFixed(2)+'N · '+(fm>1e-9?Math.atan2(fy,fx)*180/Math.PI:0).toFixed(0)+'\u00B0',cx,cy+R+18);
}

// ── Force Dots ──
function initDots(){
    let el=document.getElementById('dots');el.innerHTML='';
    for(let r=2;r>=0;r--)for(let c=0;c<3;c++){
        let p=r*3+c+1,d=document.createElement('div');
        d.className='force-dot';d.id='dot'+p;
        d.innerHTML=`<span class="num">${p}</span><span class="v">0</span>`;
        el.appendChild(d);
    }
}
function updateDots(fn,mx){
    for(let i=0;i<9;i++){
        let d=document.getElementById('dot'+(i+1));if(!d)continue;
        let v=fn[i],t=Math.max(0,Math.min(1,v/mx));
        let sz2=36+t*40; // 36-76px diameter
        let c2=vc(v,mx),a=.3+t*.7;
        d.style.width=sz2+'px';d.style.height=sz2+'px';
        d.style.background=`rgba(${c2[0]},${c2[1]},${c2[2]},${a})`;
        d.style.boxShadow=`0 0 ${8+t*20}px rgba(${c2[0]},${c2[1]},${c2[2]},${t*.4})`;
        d.querySelector('.v').textContent=v.toFixed(1);
        d.querySelector('.v').style.color=t>.5?'#000':'#fff';
    }
}

// ── History ──
function drawHist(){
    const c=document.getElementById('cHist'),x=c.getContext('2d'),W=c.width,H=c.height,p={l:42,r:10,t:14,b:24};
    x.clearRect(0,0,W,H);
    if(hT.length<2)return;
    let now=hT[hT.length-1],tm=now-8,tx=now,gW=W-p.l-p.r,gH=H-p.t-p.b;
    let ym=0;for(let i=0;i<hFN.length;i++)ym=Math.max(ym,Math.abs(hFN[i]),Math.abs(hFx[i]),Math.abs(hFy[i]));
    ym=Math.max(1,ym*1.15);let yn=-ym*.1;
    x.strokeStyle='rgba(255,255,255,.04)';x.lineWidth=1;
    for(let y=0;y<=4;y++){let yy=p.t+y/4*gH;x.beginPath();x.moveTo(p.l,yy);x.lineTo(W-p.r,yy);x.stroke();}
    x.fillStyle='#666';x.font='10px SF Mono,monospace';x.textAlign='right';
    for(let y=0;y<=4;y++){x.fillText((ym-y/4*(ym-yn)).toFixed(1),p.l-5,p.t+y/4*gH+4);}
    function pl(d,c){x.strokeStyle=c;x.lineWidth=1.5;x.beginPath();let ok=false;for(let i=0;i<d.length;i++){let px=p.l+(hT[i]-tm)/(tx-tm)*gW,py=p.t+(1-(d[i]-yn)/(ym-yn))*gH;if(px<p.l)continue;if(!ok){x.moveTo(px,py);ok=true;}else x.lineTo(px,py);}x.stroke();}
    pl(hFN,'#00d4aa');pl(hFx,'#ff6b4a');pl(hFy,'#b07aff');
    x.font='600 10px -apple-system,sans-serif';
    x.fillStyle='#00d4aa';x.fillText('\u25A0 FN',p.l+24,p.t+12);
    x.fillStyle='#ff6b4a';x.fillText('\u25A0 Fx',p.l+68,p.t+12);
    x.fillStyle='#b07aff';x.fillText('\u25A0 Fy',p.l+108,p.t+12);
}

// ── Table ──
function initTbl(){
    let tb=document.querySelector('#tbl tbody');tb.innerHTML='';
    for(let n of CH){let tr=document.createElement('tr');tr.innerHTML=`<td>${n}</td><td>--</td><td>--</td><td>--</td>`;tb.appendChild(tr);}
    for(let i=1;i<=9;i++){let tr=document.createElement('tr');tr.innerHTML=`<td>FN·${i}</td><td></td><td></td><td>--</td>`;tb.appendChild(tr);}
    for(let n of ['Fx','Fy','Fs','FN','\u03B3']){let tr=document.createElement('tr');tr.innerHTML=`<td>${n}</td><td></td><td></td><td>--</td>`;tb.appendChild(tr);}
}
function updTbl(r,f,cl){
    let rows=document.querySelectorAll('#tbl tbody tr'),idx=0;
    for(let i=0;i<11;i++){let tr=rows[idx++];tr.children[1].textContent=r[i].toFixed(0);tr.children[2].textContent=f[i].toFixed(1);
        if(i<5)tr.children[3].textContent='\u2192'+NF[i];else if(i<9)tr.children[3].textContent=SDIR[i-5];else if(i===9)tr.children[3].textContent=cl.ta.toFixed(0)+' ADC';else tr.children[3].textContent='--';}
    for(let i=0;i<9;i++){let tr=rows[idx++];tr.children[3].textContent=cl.fn[i].toFixed(3);if(cl.fn[i]>0.1)tr.classList.add('highlight');else tr.classList.remove('highlight');}
    for(let v of[cl.fx.toFixed(3),cl.fy.toFixed(3),cl.fm.toFixed(3),cl.fr.toFixed(3),cl.g!==null?cl.g.toFixed(3):'--'])rows[idx++].children[3].textContent=v;
}

// ── Main Loop ──
function loop(){
    if(!on)return;
    let now=performance.now()/1000,t=now-t0;
    let raw=gen(t),ra2=new Float64Array(raw),f=filt(ra2),cl=cal(f);
    hT.push(t);hFN.push(cl.fr);hFx.push(cl.fx);hFy.push(cl.fy);
    if(hT.length>HIST){hT.shift();hFN.shift();hFx.shift();hFy.shift();}
    fc++;if(t-lr>.5){rate=fc/(t-lr);fc=0;lr=t;}
    document.getElementById('stRate').textContent=rate.toFixed(0)+' Hz';
    document.getElementById('stTemp').textContent=cl.ta.toFixed(0)+' ADC';
    document.getElementById('stStatus').textContent='运行中';
    document.getElementById('dotRun').className='dot';
    if(cl.g!==null){
        document.getElementById('stGamma').textContent=cl.g.toFixed(2);
        let cr=document.getElementById('stCrossRef');if(!cr)return;
    }
    document.getElementById('rawLine').textContent=raw.map(v=>v.toFixed(0)).join(', ');
    let mx=parseFloat(document.getElementById('normalRange').value);
    draw3D(cl.fn,mx);drawShear(cl.s4,cl.fx,cl.fy,cl.fm);
    updateDots(cl.fn,mx);drawHist();updTbl(ra2,f,cl);
    document.getElementById('progress-bar').style.width=((t*2)%100)+'%';
    requestAnimationFrame(loop);
}

function startDemo(){on=true;t0=performance.now()/1000;fc=0;lr=0;rstF();hT=[];hFN=[];hFx=[];hFy=[];document.getElementById('btnStart').style.display='none';document.getElementById('btnStop').style.display='';requestAnimationFrame(loop);}
function stopDemo(){on=false;document.getElementById('btnStart').style.display='';document.getElementById('btnStop').style.display='none';document.getElementById('stStatus').textContent='已停止';document.getElementById('dotRun').className='dot off';}
function zeroTare(){nz=true;sz=true;}
function resetZero(){nz=false;sz=false;nb.fill(0);sb.fill(0);}

initDots();initTbl();setTimeout(startDemo,400);
</script>
