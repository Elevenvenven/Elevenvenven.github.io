<script>
"use strict";

// === Constants from Python original ===
var MA_W=15, EMA_A=0.25;
var N_ZERO=680, N_DELTA=60, N_MAX=6, S_MAX=10;
var GRID_N=30, HIST_LEN=400;
var NF_TO_POS=[1,3,5,7,9];
var POS_C=[[0,2],[1,2],[2,2],[0,1],[1,1],[2,1],[0,0],[1,0],[2,0]]; // pos 1-9
var SENSOR_XY=[[0,2],[2,2],[1,1],[0,0],[2,0]]; // NF1-5 actual positions
var CH_NAMES=["NF1","NF2","NF3","NF4","NF5","SF1_x+","SF2_x-","SF3_y+","SF4_y-","温度_ADC","标准值"];
var SDIR=["x+","x-","y+","y-"];

// === State ===
var running=false, t0=0, fc=0, lr=0, rate=0;
var zN=false, zS=false, bN=new Float64Array(5), bS=new Float64Array(4);
var mBuf=[], eBuf=null;
function rF(){mBuf=[];eBuf=null;}
var hT=[],hFN=[],hFx=[],hFy=[];

// 3D camera: matplotlib elev=28, azim=-55
var eE=28*Math.PI/180, eA=-55*Math.PI/180, cD=6;
var dr=false,dx=0,dy=0;

// === RNG ===
var rC=[1,1],rS=3,rG=.6,rO=[0,0,0,0,0],rN=0;
function rn(){var u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function ra(a,b){return a+Math.random()*(b-a);}

// === Fake data ===
function gen(t){
if(t>=rN){rC=[ra(-.15,2.15),ra(-.15,2.15)];rS=ra(1.4,5.8);rG=ra(.38,.9);rO=[rn()*.9,rn()*.9,rn()*.9,rn()*.9,rn()*.9];rN=t+ra(.28,.95);}
var cx=rC[0]+rn()*.035,cy=rC[1]+rn()*.035,n=[];
for(var i=0;i<5;i++){
var d=SENSOR_XY[i],dx=d[0]-cx,dy=d[1]-cy,sh=Math.exp(-(dx*dx+dy*dy)/(2*rG*rG));
if(Math.random()<.38){var x2=ra(-.2,2.2),y2=ra(-.2,2.2),s2=ra(.28,.65),st=ra(.3,1.8);sh+=st*Math.exp(-((d[0]-x2)**2+(d[1]-y2)**2)/(2*s2*s2));}
var fn=Math.max(0,Math.min(6,rS*sh*(1+rn()*.16)+rO[i]*.12));
n.push(Math.round(Math.max(660,Math.min(735,680+(fn/N_MAX)*N_DELTA+rn()*2.2*1.25))));
}
var px=.5+.5*Math.sin(2*Math.PI*.11*t),py=.5+.5*Math.cos(2*Math.PI*.09*t+.5);
var s=[
Math.max(0,Math.min(9,2+Math.round(5*px)+Math.floor(ra(-1,2)))),
Math.max(0,Math.min(9,2+Math.round(4*(1-px))+Math.floor(ra(-1,2)))),
Math.max(0,Math.min(9,2+Math.round(5*py)+Math.floor(ra(-1,2)))),
Math.max(0,Math.min(9,2+Math.round(4*(1-py))+Math.floor(ra(-1,2))))
];
var tp=Math.max(0,Math.min(9,5+Math.round(3*Math.sin(2*Math.PI*.025*t+1.2))+Math.floor(ra(-1,2))));
var std=202+Math.round(2*Math.sin(2*Math.PI*.07*t))+Math.floor(ra(-1,2));
return n.concat(s,tp,std);
}

// === Filter ===
function doFilt(r){
mBuf.push(r);if(mBuf.length>MA_W)mBuf.shift();
var m=new Float64Array(11);
for(var j=0;j<mBuf.length;j++)for(var i=0;i<11;i++)m[i]+=mBuf[j][i];
for(var i=0;i<11;i++)m[i]/=mBuf.length;
if(!eBuf)eBuf=new Float64Array(m);else for(var i=0;i<11;i++)eBuf[i]=EMA_A*m[i]+(1-EMA_A)*eBuf[i];
return new Float64Array(eBuf);
}

// === Calibration ===
function doCal(f){
var ni=f.slice(0,5),si=f.slice(5,9);
if(zN)for(var i=0;i<5;i++)ni[i]-=bN[i];else for(var i=0;i<5;i++)ni[i]-=N_ZERO;
if(zS)for(var i=0;i<4;i++)si[i]-=bS[i];
var fn9=new Float64Array(9);
for(var i=0;i<5;i++){var p=NF_TO_POS[i];fn9[p-1]=Math.max(0,Math.min(N_MAX,Math.abs(ni[i])/N_DELTA*N_MAX));}
fn9[1]=(fn9[0]+fn9[2]+fn9[4])/3;fn9[3]=(fn9[0]+fn9[4]+fn9[6])/3;
fn9[5]=(fn9[2]+fn9[4]+fn9[8])/3;fn9[7]=(fn9[4]+fn9[6]+fn9[8])/3;
var s4=new Float64Array(4);for(var i=0;i<4;i++)s4[i]=Math.max(0,Math.min(S_MAX,si[i]));
var fx=s4[0]-s4[1],fy=s4[2]-s4[3],fm=Math.hypot(fx,fy);
var fr=0;for(var i=0;i<9;i++)if(fn9[i]>fr)fr=fn9[i];
var gm=fm>1e-9?fr/fm:null;
return{fn9:fn9,s4:s4,fx:fx,fy:fy,fm:fm,fr:fr,gm:gm,ta:f[9]};
}

// === IDW ===
function doIDW(fn9,gn){
var g=[];
for(var gy=0;gy<=gn;gy++){g[gy]=[];for(var gx=0;gx<=gn;gx++){
var px=gx/gn*2,py=(1-gy/gn)*2,ws=0,v=0;
for(var i=0;i<9;i++){var sx=POS_C[i][0],sy=POS_C[i][1],d=(px-sx)**2+(py-sy)**2,w=1/(Math.pow(d+.035,1.65)+1e-9);v+=w*fn9[i];ws+=w;}
g[gy][gx]=v/ws;
}}return g;
}

// === Color: RdYlGn_r ===
function cR(v,mx){
var t=Math.max(0,Math.min(1,v/mx)),r,g,b;
if(t<.25){var u=t/.25;r=~~(100*u);g=~~(130+125*u);b=~~(60+60*u);}
else if(t<.5){var u=(t-.25)/.25;r=~~(100+155*u);g=255;b=~~(120-120*u);}
else if(t<.75){var u=(t-.5)/.25;r=255;g=~~(255-100*u);b=0;}
else{var u=(t-.75)/.25;r=255;g=~~(155-155*u);b=0;}
return[r,g,b];
}

// === 3D projection (matplotlib style) ===
function P3(x,y,z){
var x0=x-1,y0=y-1;
var cA=Math.cos(eA),sA=Math.sin(eA),cE=Math.cos(eE),sE=Math.sin(eE);
var x1=x0*cA-y0*sA;
var y1=x0*sA+y0*cA;
var y2=y1*cE-z*sE;
var z2=y1*sE+z*cE;
var f=cD/(cD+z2*.12);
// Center: canvas 860x600, surface centered at (430,300)
return[430+x1*f*160,300-y2*f*160,z2];
}

// === Draw 3D surface ===
function draw3D(fn9,mx){
var c=document.getElementById('c3d'),x=c.getContext('2d'),W=860,H=600;
x.clearRect(0,0,W,H);x.fillStyle='#fafafa';x.fillRect(0,0,W,H);

var g=doIDW(fn9,GRID_N),qs=[];
for(var gy=0;gy<GRID_N;gy++)for(var gx=0;gx<GRID_N;gx++){
var u0=gx/GRID_N*2,v0=(1-gy/GRID_N)*2,u1=(gx+1)/GRID_N*2,v1=(1-(gy+1)/GRID_N)*2;
var f00=g[gy][gx],f10=g[gy][gx+1],f01=g[gy+1][gx],f11=g[gy+1][gx+1];
var p00=P3(u0,v0,f00),p10=P3(u1,v0,f10),p01=P3(u0,v1,f01),p11=P3(u1,v1,f11);
var az=(p00[2]+p10[2]+p01[2]+p11[2])/4;
var af=(f00+f10+f01+f11)/4;
var du=2/GRID_N;
var nx=(f10-f00)*(f11-f01)-(f01-f00)*(f11-f10);
var ny=(f01-f00)*(f11-f10)-(f10-f00)*(f01-f00);
var nz=du*du;
var nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
var lt=Math.max(.35,.5+.5*(nx*.2+ny*.3+nz*.9)/nl);
qs.push({p00:p00,p10:p10,p01:p01,p11:p11,az:az,af:af,lt:lt});
}
qs.sort(function(a,b){return b.az-a.az;});
for(var i=0;i<qs.length;i++){
var q=qs[i],c2=cR(q.af,mx);
var r=~~(c2[0]*q.lt),g=~~(c2[1]*q.lt),b=~~(c2[2]*q.lt);
x.fillStyle='rgb('+r+','+g+','+b+')';
x.strokeStyle='rgba('+(r>>1)+','+(g>>1)+','+(b>>1)+',.4)';
x.lineWidth=.4;
x.beginPath();x.moveTo(q.p00[0],q.p00[1]);x.lineTo(q.p10[0],q.p10[1]);x.lineTo(q.p11[0],q.p11[1]);x.lineTo(q.p01[0],q.p01[1]);x.closePath();x.fill();x.stroke();
}

// Scatter points
x.fillStyle='#333';x.font='11px monospace';x.textAlign='center';
for(var i=0;i<9;i++){
var p=P3(POS_C[i][0],POS_C[i][1],fn9[i]);
x.beginPath();x.arc(p[0],p[1],3,0,2*Math.PI);x.fill();
x.fillText(String(i+1),p[0],p[1]-10);
x.fillText(fn9[i].toFixed(1),p[0],p[1]+14);
}

// Title & axes
x.font='bold 13px sans-serif';x.fillStyle='#333';x.textAlign='center';
x.fillText('3\u00d73 \u6cd5\u5411\u529b\u8868\u9762\u56fe',430,575);
x.font='11px sans-serif';x.fillStyle='#555';
x.fillText('X \u4f4d\u7f6e',430,590);

// Colorbar
var cbX=790,cbY=70,cbH=400;
for(var y=0;y<cbH;y++){
var v=(1-y/cbH)*mx,c2=cR(v,mx);
x.fillStyle='rgb('+c2[0]+','+c2[1]+','+c2[2]+')';x.fillRect(cbX,cbY+y,16,1.5);
}
x.strokeStyle='#999';x.lineWidth=.5;x.strokeRect(cbX,cbY,16,cbH);
x.font='10px monospace';x.fillStyle='#555';x.textAlign='left';
x.fillText('0 N',cbX+20,cbY+cbH);
x.fillText(mx.toFixed(0)+' N',cbX+20,cbY+6);
x.save();x.translate(cbX-10,cbY+cbH/2);x.rotate(-Math.PI/2);x.textAlign='center';x.fillText('法向力 / N',0,0);x.restore();
}

// 3D mouse
(function(){
var el=document.getElementById('c3d');
el.addEventListener('mousedown',function(e){dr=true;dx=e.clientX;dy=e.clientY;});
el.addEventListener('mousemove',function(e){if(!dr)return;eA+=(e.clientX-dx)*.006;eE+=(e.clientY-dy)*.006;eE=Math.max(.05,Math.min(1.4,eE));dx=e.clientX;dy=e.clientY;});
el.addEventListener('mouseup',function(){dr=false;});
el.addEventListener('mouseleave',function(){dr=false;});
el.addEventListener('wheel',function(e){e.preventDefault();cD=Math.max(3,Math.min(12,cD+e.deltaY*.01));},{passive:false});
el.addEventListener('touchstart',function(e){e.preventDefault();dr=true;dx=e.touches[0].clientX;dy=e.touches[0].clientY;},{passive:false});
el.addEventListener('touchmove',function(e){if(!dr)return;e.preventDefault();eA+=(e.touches[0].clientX-dx)*.006;eE+=(e.touches[0].clientY-dy)*.006;eE=Math.max(.05,Math.min(1.4,eE));dx=e.touches[0].clientX;dy=e.touches[0].clientY;},{passive:false});
el.addEventListener('touchend',function(){dr=false;});
})();

// === Heatmap (top-down) ===
function drawHm(fn9,mx){
var c=document.getElementById('cHm'),x=c.getContext('2d'),W=520,H=480,pad=40;
x.clearRect(0,0,W,H);x.fillStyle='#fafafa';x.fillRect(0,0,W,H);
var gw=W-2*pad,gh=H-2*pad,g=doIDW(fn9,26);
for(var gy=0;gy<26;gy++)for(var gx=0;gx<26;gx++){
var v=Math.max(0,Math.min(mx,g[gy][gx])),c2=cR(v,mx);
x.fillStyle='rgb('+c2[0]+','+c2[1]+','+c2[2]+')';
x.fillRect(pad+gx/26*gw,pad+(1-(gy+1)/26)*gh,gw/26+.5,gh/26+.5);
}
x.font='bold 11px monospace';x.textAlign='center';x.textBaseline='middle';
for(var i=0;i<9;i++){
var px=pad+POS_C[i][0]/2*gw,py=pad+(1-POS_C[i][1]/2)*gh;
x.fillStyle='#333';x.beginPath();x.arc(px,py,3.5,0,2*Math.PI);x.fill();
x.fillText(fn9[i].toFixed(1),px,py+15);
}
x.font='bold 13px sans-serif';x.fillStyle='#333';x.textBaseline='alphabetic';
x.fillText('3\u00d73 \u6cd5\u5411\u529b\u70ed\u529b\u56fe',W/2,22);
x.font='11px sans-serif';x.fillStyle='#555';
x.fillText('X \u4f4d\u7f6e',W/2,H-6);
x.save();x.translate(14,H/2);x.rotate(-Math.PI/2);x.textAlign='center';x.fillText('Y \u4f4d\u7f6e',0,0);x.restore();
var cbX=W-30,cbY=40,cbH=H-80;
for(var y=0;y<cbH;y++){var v=(1-y/cbH)*mx,c2=cR(v,mx);x.fillStyle='rgb('+c2[0]+','+c2[1]+','+c2[2]+')';x.fillRect(cbX,cbY+y,12,1.5);}
x.font='9px monospace';x.fillStyle='#555';x.textAlign='left';
x.fillText('0',cbX+14,cbY+cbH);x.fillText(mx.toFixed(0),cbX+14,cbY+6);
}

// === Shear vector ===
function drawSh(s4,fx,fy,fm){
var c=document.getElementById('cSh'),x=c.getContext('2d'),W=420,H=400,pad=45;
x.clearRect(0,0,W,H);x.fillStyle='#fafafa';x.fillRect(0,0,W,H);
var cx=W/2,cy=H/2,lim=parseFloat(document.getElementById('sR').value);
var pxN=(Math.min(W,H)-2*pad)/(2*lim);

x.strokeStyle='#e0e0e0';x.lineWidth=.5;
for(var i=-5;i<=5;i++){
var v=i/5*lim;
var lx=cx+v*pxN,ly=cy-v*pxN;
x.beginPath();x.moveTo(lx,pad);x.lineTo(lx,H-pad);x.stroke();
x.beginPath();x.moveTo(pad,ly);x.lineTo(W-pad,ly);x.stroke();
}
x.strokeStyle='#aaa';x.lineWidth=1;
x.beginPath();x.moveTo(cx,pad);x.lineTo(cx,H-pad);x.stroke();
x.beginPath();x.moveTo(pad,cy);x.lineTo(W-pad,cy);x.stroke();

x.font='9px monospace';x.fillStyle='#888';x.textAlign='center';
for(var i=-2;i<=2;i++){x.fillText((i*lim/2).toFixed(1),cx+i*lim/2*pxN,H-pad+12);}
x.textAlign='right';
for(var i=-2;i<=2;i++){x.fillText((i*lim/2).toFixed(1),pad-4,cy-i*lim/2*pxN+4);}

x.font='bold 11px sans-serif';x.fillStyle='#4f4b93';x.textAlign='center';
x.fillText('S3 y+: '+s4[2].toFixed(2)+' N',cx,pad+14);
x.fillText('S1 x+: '+s4[0].toFixed(2)+' N',W-pad-2,cy+4);
x.fillText('S4 y-: '+s4[3].toFixed(2)+' N',cx,H-pad-4);
x.fillText('S2 x-: '+s4[1].toFixed(2)+' N',pad+14,cy+4);

var ax=fx*pxN,ay=-fy*pxN;
if(Math.hypot(ax,ay)>2){
x.strokeStyle='limegreen';x.fillStyle='limegreen';x.lineWidth=2;
x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+ax,cy+ay);x.stroke();
var ag=Math.atan2(ay,ax),hw=10;
x.beginPath();x.moveTo(cx+ax,cy+ay);
x.lineTo(cx+ax-hw*Math.cos(ag-.3),cy+ay-hw*Math.sin(ag-.3));
x.lineTo(cx+ax-hw*Math.cos(ag+.3),cy+ay-hw*Math.sin(ag+.3));
x.closePath();x.fill();
}
x.fillStyle='#000';x.beginPath();x.arc(cx,cy,3,0,2*Math.PI);x.fill();
x.fillStyle='#b24735';x.font='bold 11px sans-serif';x.textAlign='left';
var ang=fm>1e-9?Math.atan2(fy,fx)*180/Math.PI:0;
x.fillText('F: '+fm.toFixed(2)+' N  角度: '+ang.toFixed(0)+'°',pad+4,H-6);
x.font='bold 12px sans-serif';x.fillStyle='#333';x.textAlign='center';
x.fillText('2D 剪切力矢量  |FS|='+fm.toFixed(2)+' N',cx,16);
}

// === History ===
function drawHi(){
var c=document.getElementById('cHi'),x=c.getContext('2d'),W=480,H=380,p={l:44,r:12,t:20,b:30};
x.clearRect(0,0,W,H);x.fillStyle='#fafafa';x.fillRect(0,0,W,H);
if(hT.length<2){x.fillStyle='#999';x.font='12px sans-serif';x.textAlign='center';x.fillText('近期力曲线',W/2,H/2);return;}
var now=hT[hT.length-1],tm=now-8,tx=now,gW=W-p.l-p.r,gH=H-p.t-p.b;
var yMax=0,yMin=0;
for(var i=0;i<hFN.length;i++){if(hFN[i]>yMax)yMax=hFN[i];if(hFN[i]<yMin)yMin=hFN[i];if(hFx[i]>yMax)yMax=hFx[i];if(hFx[i]<yMin)yMin=hFx[i];if(hFy[i]>yMax)yMax=hFy[i];if(hFy[i]<yMin)yMin=hFy[i];}
var yRange=Math.max(1,Math.max(Math.abs(yMax),Math.abs(yMin))*1.15);
var ym=yRange,yn=-yRange;

x.strokeStyle='#e0e0e0';x.lineWidth=.5;
for(var y=0;y<=5;y++){var yy=p.t+y/5*gH;x.beginPath();x.moveTo(p.l,yy);x.lineTo(W-p.r,yy);x.stroke();}
x.strokeStyle='#888';x.lineWidth=1;
x.beginPath();x.moveTo(p.l,p.t);x.lineTo(p.l,H-p.b);x.lineTo(W-p.r,H-p.b);x.stroke();
x.font='9px monospace';x.fillStyle='#555';x.textAlign='right';
for(var y=0;y<=5;y++){x.fillText((ym-y/5*(ym-yn)).toFixed(1),p.l-4,p.t+y/5*gH+3);}
x.textAlign='center';
for(var xi=0;xi<=4;xi++){x.fillText((tm+xi/4*(tx-tm)).toFixed(1)+'s',p.l+xi/4*gW,H-p.b+14);}

function pl(data,col){x.strokeStyle=col;x.lineWidth=1.5;x.beginPath();var ok=false;for(var i=0;i<data.length;i++){var px=p.l+(hT[i]-tm)/(tx-tm)*gW,py=p.t+(1-(data[i]-yn)/(ym-yn))*gH;py=Math.max(p.t,Math.min(p.t+gH,py));if(px<p.l)continue;if(!ok){x.moveTo(px,py);ok=true;}else x.lineTo(px,py);}x.stroke();}
pl(hFN,'#1f77b4');pl(hFx,'#ff7f0e');pl(hFy,'#2ca02c');

x.font='bold 10px sans-serif';x.textAlign='left';
x.fillStyle='#1f77b4';x.fillText('\u2500 FN_repr',p.l+16,p.t+14);
x.fillStyle='#ff7f0e';x.fillText('\u2500 Fx',p.l+80,p.t+14);
x.fillStyle='#2ca02c';x.fillText('\u2500 Fy',p.l+125,p.t+14);
x.font='bold 12px sans-serif';x.fillStyle='#333';x.textAlign='center';
x.fillText('\u8fd1\u671f\u529b\u66f2\u7ebf',W/2,12);
x.font='11px sans-serif';x.fillStyle='#555';
x.fillText('\u65f6\u95f4 / s',W/2,H-2);
x.save();x.translate(10,p.t+gH/2);x.rotate(-Math.PI/2);x.textAlign='center';x.fillText('\u529b / N',0,0);x.restore();
}

// === Table ===
function initT(){
var tb=document.getElementById('tB');tb.innerHTML='';
var labels=CH_NAMES.slice();
for(var i=1;i<=9;i++)labels.push('FN_pos'+i);
labels.push('Fx','Fy','Fshear_mag','FN_repr','Gamma');
for(var j=0;j<labels.length;j++){var tr=document.createElement('tr');tr.innerHTML='<td>'+labels[j]+'</td><td>--</td><td>--</td><td>--</td>';tb.appendChild(tr);}
}
function updT(r,f,cl){
var rows=document.getElementById('tB').children,idx=0;
for(var i=0;i<11;i++){var tr=rows[idx++];tr.children[1].textContent=r[i].toFixed(0);tr.children[2].textContent=f[i].toFixed(2);
if(i<5)tr.children[3].textContent='映射到 FN 位置';else if(i<9)tr.children[3].textContent='FS '+SDIR[i-5];else if(i===9)tr.children[3].textContent=cl.ta.toFixed(0)+' ADC';else tr.children[3].textContent='标准值';}
for(var i=0;i<9;i++)rows[idx++].children[3].textContent=cl.fn9[i].toFixed(3);
var ex=[cl.fx.toFixed(3),cl.fy.toFixed(3),cl.fm.toFixed(3),cl.fr.toFixed(3),cl.gm!==null?cl.gm.toFixed(3):'--'];
for(var i=0;i<ex.length;i++)rows[idx++].children[3].textContent=ex[i];
}

// === Main loop ===
function loop(){
if(!running)return;
try{
var now=performance.now()/1000,t=now-t0;
var raw=gen(t),rawA=new Float64Array(raw),filt=doFilt(rawA),cl=doCal(filt);
hT.push(t);hFN.push(cl.fr);hFx.push(cl.fx);hFy.push(cl.fy);
if(hT.length>HIST_LEN){hT.shift();hFN.shift();hFx.shift();hFy.shift();}
fc++;if(t-lr>.5){rate=fc/(t-lr);fc=0;lr=t;}
document.getElementById('s1').textContent='已连接到模拟 ESP32 演示';
document.getElementById('s2').textContent=rate.toFixed(1)+' Hz';
document.getElementById('s3').textContent=cl.ta.toFixed(0)+' ADC';
var hd=cl.ta<1100?100:cl.ta<2050?Math.round((2100-cl.ta)*100/(2100-1100)):0;
document.getElementById('s4').textContent=hd+'%';
if(cl.gm!==null){
document.getElementById('s5').textContent=cl.gm.toFixed(2);
var se=document.getElementById('s6');
if(cl.fm<4){se.textContent='FS < 4 N，弱检测';se.style.color='#8a6d3b';}
else if(.25<=cl.gm&&cl.gm<=2){se.textContent='正常';se.style.color='green';}
else{se.textContent='可能干扰/接触变化';se.style.color='red';}
}else{document.getElementById('s5').textContent='--';document.getElementById('s6').textContent='剪切力过小';document.getElementById('s6').style.color='gray';}
document.getElementById('rawL').textContent='原始数据: '+raw.map(function(v){return v.toFixed(0);}).join(', ');
var mx=parseFloat(document.getElementById('nR').value);
draw3D(cl.fn9,mx);drawHm(cl.fn9,mx);drawSh(cl.s4,cl.fx,cl.fy,cl.fm);drawHi();updT(rawA,filt,cl);
requestAnimationFrame(loop);
}catch(e){document.getElementById('rawL').textContent='错误: '+e.message;document.getElementById('rawL').style.color='red';running=false;}
}

function doStart(){running=true;t0=performance.now()/1000;fc=0;lr=0;rF();hT=[];hFN=[];hFx=[];hFy=[];document.getElementById('btnS').style.display='none';document.getElementById('btnE').style.display='';requestAnimationFrame(loop);}
function doStop(){running=false;document.getElementById('btnS').style.display='';document.getElementById('btnE').style.display='none';document.getElementById('s1').textContent='未连接';}
function doZN(){zN=true;document.getElementById('s1').textContent='法向力归零已应用';}
function doZS(){zS=true;document.getElementById('s1').textContent='剪切力归零已应用';}
function doZR(){zN=false;zS=false;bN.fill(0);bS.fill(0);document.getElementById('s1').textContent='所有归零基线已重置';}

initT();setTimeout(doStart,300);
</script>
</body>
</html>
